# ==========================================
# DSA-GradeSecure Application Properties
# ==========================================

# Server
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/dsa_gradesecure?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Manila
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# SQL initialization (runs schema.sql and data.sql on startup)
spring.sql.init.mode=always
spring.sql.init.separator=;;
spring.jpa.defer-datasource-initialization=true
