<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeSecure — Audit Trail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i class="bi bi-shield-lock-fill"></i></div>
                <span class="app-name">GradeSecure</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item" data-page="dashboard"><i class="bi bi-grid-1x2"></i> Dashboard</a>
                <div class="nav-section">Management</div>
                <a href="classes.html" class="nav-item" data-page="classes"><i class="bi bi-collection"></i> Classes</a>
                <a href="spreadsheet.html" class="nav-item" data-page="grades"><i class="bi bi-table"></i> Grades</a>
                <div class="nav-section">Reports</div>
                <a href="audit.html" class="nav-item" data-page="audit"><i class="bi bi-clock-history"></i> Audit Trail</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-avatar" id="userInitials">AD</div>
                <div class="user-info">
                    <div class="user-name" id="sidebarUserName"></div>
                    <div class="user-role" id="sidebarUserRole"></div>
                </div>
                <button class="btn btn-ghost btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right"></i></button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>Audit Trail</h1>
                    <div class="subtitle">Track all grade modifications across the system</div>
                </div>
                <div class="page-header-actions">
                    <select class="form-select" id="auditFilter" style="width:180px;" onchange="loadAuditLogs()">
                        <option value="">All events</option>
                        <option value="grades">Grades only</option>
                    </select>
                    <button class="btn btn-secondary btn-sm" onclick="loadAuditLogs()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
                </div>
            </div>

            <div class="page-body">
                <div class="card">
                    <div class="card-header">
                        <h3>Event Log</h3>
                        <span class="badge badge-gray" id="logCount">0 events</span>
                    </div>
                    <div class="card-body no-pad" id="auditContainer">
                        <div class="text-center" style="padding:2rem;"><div class="spinner"></div></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/audit.js"></script>
</body>
</html>
