<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeSecure — Classes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i class="bi bi-shield-lock-fill"></i></div>
                <span class="app-name">GradeSecure</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item" data-page="dashboard"><i class="bi bi-grid-1x2"></i> Dashboard</a>
                <div class="nav-section">Management</div>
                <a href="classes.html" class="nav-item" data-page="classes"><i class="bi bi-collection"></i> Classes</a>
                <a href="spreadsheet.html" class="nav-item" data-page="grades"><i class="bi bi-table"></i> Grades</a>
                <div class="nav-section">Reports</div>
                <a href="audit.html" class="nav-item" data-page="audit"><i class="bi bi-clock-history"></i> Audit Trail</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-avatar" id="userInitials">AD</div>
                <div class="user-info">
                    <div class="user-name" id="sidebarUserName"></div>
                    <div class="user-role" id="sidebarUserRole"></div>
                </div>
                <button class="btn btn-ghost btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right"></i></button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>Classes</h1>
                    <div class="subtitle">Manage your classes and student rosters</div>
                </div>
                <div class="page-header-actions">
                    <button class="btn btn-primary" onclick="showCreateClass()"><i class="bi bi-plus-lg"></i> New class</button>
                </div>
            </div>

            <div class="page-body">
                <div class="card" id="createClassCard" style="display:none;margin-bottom:1rem;">
                    <div class="card-body">
                        <form id="createClassForm" style="display:flex;gap:0.5rem;align-items:flex-end;">
                            <div style="flex:1;">
                                <label class="form-group label" style="font-size:0.8rem;font-weight:500;color:var(--color-gray-700);display:block;margin-bottom:0.25rem;">Class name</label>
                                <input type="text" class="form-input" id="className" placeholder="e.g., BSIT 2A — Data Structures" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Create</button>
                            <button type="button" class="btn btn-secondary" onclick="hideCreateClass()">Cancel</button>
                        </form>
                    </div>
                </div>

                <div class="class-grid" id="classesList">
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="spinner"></div><p class="mt-1">Loading classes...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="addStudentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Students</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="addStudentClassId">
                    <div class="form-group">
                        <label>Student full name</label>
                        <input type="text" class="form-input" id="studentName" placeholder="e.g., Juan Dela Cruz">
                    </div>
                    <div id="addStudentMsg" class="alert-bar success" style="display:none;"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Done</button>
                    <button type="button" class="btn btn-primary" onclick="addStudent()"><i class="bi bi-plus-lg"></i> Add student</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="rosterModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Student Roster — <span id="rosterClassName"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="rosterBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/classes.js"></script>
</body>
</html>
