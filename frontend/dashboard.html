<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeSecure — Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i class="bi bi-shield-lock-fill"></i></div>
                <span class="app-name">GradeSecure</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item" data-page="dashboard"><i class="bi bi-grid-1x2"></i> Dashboard</a>
                <div class="nav-section">Management</div>
                <a href="classes.html" class="nav-item" data-page="classes"><i class="bi bi-collection"></i> Classes</a>
                <a href="spreadsheet.html" class="nav-item" data-page="grades"><i class="bi bi-table"></i> Grades</a>
                <div class="nav-section">Reports</div>
                <a href="audit.html" class="nav-item" data-page="audit"><i class="bi bi-clock-history"></i> Audit Trail</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-avatar" id="userInitials">AD</div>
                <div class="user-info">
                    <div class="user-name" id="sidebarUserName"></div>
                    <div class="user-role" id="sidebarUserRole"></div>
                </div>
                <button class="btn btn-ghost btn-sm" onclick="logout()" title="Sign out"><i class="bi bi-box-arrow-right"></i></button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>Dashboard</h1>
                    <div class="subtitle">Welcome back, <span id="welcomeName"></span></div>
                </div>
            </div>

            <div class="page-body">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total Classes</div>
                        <div class="stat-value" id="statClasses">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Students</div>
                        <div class="stat-value" id="statStudents">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Grades Entered</div>
                        <div class="stat-value" id="statGrades">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Audit Events</div>
                        <div class="stat-value" id="statAudit">—</div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>Recent Classes</h3>
                        <a href="classes.html" class="btn btn-secondary btn-sm">View all</a>
                    </div>
                    <div class="card-body no-pad" id="classesTableContainer">
                        <div class="empty-state">
                            <div class="spinner"></div>
                            <p class="mt-1">Loading...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const user = requireLogin();
        if (user) {
            initSidebar(user, 'dashboard');
            document.getElementById('welcomeName').textContent = user.fullName;
            loadDashboard();
        }

        async function loadDashboard() {
            try {
                const classes = await api.getClasses(user.role === 'TEACHER' ? user.id : null);
                document.getElementById('statClasses').textContent = classes.length;
                let totalStudents = 0;
                classes.forEach(c => totalStudents += c.studentCount || 0);
                document.getElementById('statStudents').textContent = totalStudents;

                if (classes.length === 0) {
                    document.getElementById('classesTableContainer').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon"><i class="bi bi-collection"></i></div>
                            <h4>No classes yet</h4>
                            <p>Create your first class to start managing grades.</p>
                            <a href="classes.html" class="btn btn-primary btn-sm">Create class</a>
                        </div>`;
                } else {
                    let html = '<table class="data-table"><thead><tr><th>Class Name</th><th>Instructor</th><th>Students</th><th></th></tr></thead><tbody>';
                    classes.forEach(c => {
                        html += `<tr>
                            <td class="fw-600">${c.name}</td>
                            <td>${c.teacherName || '—'}</td>
                            <td><span class="badge badge-gray">${c.studentCount}</span></td>
                            <td class="text-right"><a href="spreadsheet.html?classId=${c.id}" class="btn btn-secondary btn-sm">Open grades</a></td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('classesTableContainer').innerHTML = html;
                }

                try {
                    const logs = await api.getAuditLogs();
                    document.getElementById('statAudit').textContent = logs.length;
                } catch { document.getElementById('statAudit').textContent = '0'; }
                document.getElementById('statGrades').textContent = '—';
            } catch (err) { console.error(err); }
        }
    </script>
</body>
</html>
