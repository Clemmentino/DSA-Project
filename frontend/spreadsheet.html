<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeSecure — Grades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i class="bi bi-shield-lock-fill"></i></div>
                <span class="app-name">GradeSecure</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item" data-page="dashboard"><i class="bi bi-grid-1x2"></i> Dashboard</a>
                <div class="nav-section">Management</div>
                <a href="classes.html" class="nav-item" data-page="classes"><i class="bi bi-collection"></i> Classes</a>
                <a href="spreadsheet.html" class="nav-item" data-page="grades"><i class="bi bi-table"></i> Grades</a>
                <div class="nav-section">Reports</div>
                <a href="audit.html" class="nav-item" data-page="audit"><i class="bi bi-clock-history"></i> Audit Trail</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-avatar" id="userInitials">AD</div>
                <div class="user-info">
                    <div class="user-name" id="sidebarUserName"></div>
                    <div class="user-role" id="sidebarUserRole"></div>
                </div>
                <button class="btn btn-ghost btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right"></i></button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>Grades</h1>
                    <div class="subtitle">Manage student grades and generate rankings</div>
                </div>
                <div class="page-header-actions">
                    <select class="form-select" id="classSelect" style="width:240px;">
                        <option value="">Select a class</option>
                    </select>
                </div>
            </div>

            <div class="page-body">
                <!-- Action bar (shown when class is selected) -->
                <div id="actionBar" style="display:none;margin-bottom:1rem;display:flex;gap:0.5rem;flex-wrap:wrap;" class="d-flex gap-2">
                    <button class="btn btn-secondary btn-sm" onclick="addActivityPrompt()" id="btnAddActivity"><i class="bi bi-plus-lg"></i> Add activity</button>
                    <button class="btn btn-secondary btn-sm" onclick="runSort()" id="btnRanking"><i class="bi bi-trophy"></i> Generate rankings</button>
                    <a class="btn btn-secondary btn-sm" id="btnExport" href="#"><i class="bi bi-download"></i> Export CSV</a>
                </div>

                <!-- Spreadsheet -->
                <div class="card">
                    <div class="card-body no-pad" id="spreadsheetContainer">
                        <div class="empty-state">
                            <div class="empty-icon"><i class="bi bi-table"></i></div>
                            <h4>Select a class</h4>
                            <p>Choose a class from the dropdown to view and edit grades.</p>
                        </div>
                    </div>
                </div>

                <!-- Rankings (shown after sort) -->
                <div class="card" id="rankingsCard" style="display:none;margin-top:1rem;">
                    <div class="card-header">
                        <h3>Student Rankings</h3>
                        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('rankingsCard').style.display='none'"><i class="bi bi-x-lg"></i></button>
                    </div>
                    <div class="card-body no-pad" id="rankingsContainer"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="activityModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Activity</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Activity name</label>
                        <input type="text" class="form-input" id="activityName" placeholder="e.g., Quiz 1, Midterm Exam">
                    </div>
                    <div class="form-group">
                        <label>Max score</label>
                        <input type="number" class="form-input" id="activityMaxScore" value="100" min="1">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="addActivity()">Add activity</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/spreadsheet.js"></script>
</body>
</html>
